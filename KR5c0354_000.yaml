front:
  text: 太上混元真録川一老君在殷周之時或出或處凡經二百餘載焉每以心為無心以身為無身以太虛為上存真為寶歷思天門之奧浮遊八荒之表呼吸生氣與神相保無小無大無醜無好榮祿代光視如芻草是故以無心之心無身之身包裹天地養育萬物也夫心非心者大也身非身者廣也凡此數者不可勝也取之於無事故能以道豐國和柔百姓所以成康之際天下安寧刑錯不用康王崩太子瑕立是為昭王是時太上復命老君開化西域天竺維衛大秦安息罽賓諸國以八天隱文授於昭王昭王自謂居自然之運代五帝之氣錯綜陰陽之理不崇天文老君知周之衰乃收天文因而退官歸居故里於是隱遁間居欲往流沙其時天西北有絶滅之國去崑崙山九十萬里國名長引其國中人身長四十尺壽八千歲皆有道德欲往從之言歸崑崙到無極元年歲在癸丑五月壬午乃爰駕青牛馭軬音反車去周西度焉其時王道微缺政教不行故牽成叔老君頌曰深哉李氏誕此聖姿研精玄奧幽讚神微抱質懷素藴寶藏暉述而好古儀聖作師周衰道廢厥猷匪宣龍潜初九抗志浩然於邈遐風徽音永傳
