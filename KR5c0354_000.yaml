body:
  text: 薛道衡亦云小兹五嶽隘此九州逝將高蹈超然遠遊青牛已駕紫氣先浮玄門洞啓神化潜流論曰竊按經史周秦以前帝王諸侯並無年號皆云元年二年而已近至漢文始立中元後元武帝之時方號元光元朔今據太玄經及節解內解文始內傳道德經序並云老君以上皇元年丁卯下為周師到無極元年癸丑去周西度者此乃鬼谷子郭子張天師葛仙公等引諸天年號以配人間時代者也自非得道真仙敦能洞究之焉亦如開皇赤明朱靈上和等號固非流俗所知矣或云去周西度者此正言去周官而歸然後潜度函關非謂仕周之日便即公然西適也是時周居豐鎬關在其東故文始內傳云法有聖人經過京邑故掃路燒香以候天真入境是也若言周在關東便是天真出境何謂入境歟由是而論尤明老君發自瀨鄉而來信矣或云見周衰者謂屬昭王政化微缺之時也而諸經論或云幽厲平敬之時西度者斯並穿鑿誤之深矣是時老君浮紫氣乘青牛車薄版為隆穹從無極先生鬼谷先生北郭先生西邁道經函谷關其關在陜州桃林縣南一十二里有故關墟是也關令姓尹名喜字公文其父避紂淫亂乃潜遊秦州天水因遂家焉其先積德纍仁流慶所萃而乃誕焉母氏曾晝寢夢天降電流繞其身見有長人語令咽之既覺口有盈味及生時雙光若日飛遊其側室內皆明良久不知所在其家堂陸地自生蓮華光色鮮盛及誕眼有日精姿形長雅垂臂下膝堂堂然有天人之貌少好學墳索易善於天文祕緯仰觀俯察莫不洞徹雖鬼神無以匿其情狀大度瑰然不修俗禮榮戚不形於色懷道逍遙有遠遊之志其後果歷涉山水考詳川谷眷言此地知必成真乃結草為樓精思至道康王聞之拜為大夫以其因樓觀望故號此宅為樓觀今之雍州終南山陰盩厔縣神就鄉聞仙里中有草樓罽壇仁祠靈宇歷代崇護于今尚在時關令務行陰德不求聞達而逸響遐宣京師美之乃入侍東宫賓友至昭王時瞻見東方紫氣西邁知有聖人當度乃求出為函谷關令以物色而遮之曰夫陽數盡九星宿值今歲月並王復九十日之外法應有聖人經過京邑至期乃齊戒念真使掃路四十里夾道燒香以俟天真入境其時先敕關卒孫景云若有異服古人之狀乘青牛薄版車勿聽過關其年癸丑七月十二日甲子果遇老君乘白輿駕青牛而至關關吏曰明府有教願大人少留神吏便入白曰適有一老公丈人之狀乘青牛車從東來求度西關喜曰諾道今來矣我得見聖人矣即帶印綬出迎設弟子之禮而邀焉曰願大人暫枉神駕老君謝曰吾貧賤老翁耳居在關東田在關西欲往取薪何故見留幸相聽度吾無道德子焉執敬若斯謬亦甚矣老君故謙辭聊復試之未肯以前此一試也喜復稽首曰大人豈取薪願暫留神駕老君又曰聞道竺乾有古先生善入無為不終不始永存綿綿是以升就道經歷關或云吾聞大秦有古先生其道無為故往觀焉路由於此何妄留耶此二試也喜又曰今睹大人之狀聖姿超絶乃天上極尊何邊夷之有可往觀乎願不惑言少垂哀愍老君又曰子見何祥乃能知之此三試也喜答曰往冬十月天里之星西行過昴今之朔內融風三至東南真氣狀如龍蛇而西渡漢此真人之徵也喜少好讀墳易及仰觀天文俯察地理風雲之應未嘗不驗前望見紫氣西邁夫陽數極九復九十日當有聖人微服乘青牛薄版車從東來度自爾已來夙夜存思夢想真人有日久矣今睹大人容貌瑰然聖姿超代喜自少及長未嘗所見以喜所知君豈非上古真人者乎老君三試之皆過乃怡然笑曰吾知子念道故來相試子有神通之明當得度代也或云老君乃舑然吐舌曰善哉子之知吾吾亦知子矣如此三反覆然後從喜而前故四皓曰觀老氏與尹生豈不敬悟先機耶而照執謙辭者欲教代耳關令於是設坐官舍行弟子之禮北面而事之命作名厨盛饌以進老君焉老君復試其慈捨之心時有債客姓徐名甲日雇錢一百先與約語須吾行達西海大秦安息國歸以黃金頓備錢限甲既見老君方欲遠遊疑遂不還其直因美女誘之乃舉辭詣關令訟老君求錢老君謂甲曰汝隨我已二百餘歲應還七百二十萬錢汝命早應死所以常生至今賴我太玄生符在身耳言畢見太玄生符飛從甲口出還老君前文字新眀甲已成一聚白骨喜見甲違心便死有意愍之復欲觀老君能起死人不因曰喜當代還此直即具錢來曰伏願大人赦甲往罪賜其更生老君愍喜慈捨曰善復以向符投其枯骨甲即還生如故老君曰吾不責汝汝負本約而道自去汝故致死耳今還汝錢矣因乃禮遣之老君既二三試關令皆度知其必得道乃停關下百有餘日焉關今稽首曰晚生淺識耳目滓滯迷惑代俗沈淪聲色今見聖人如聾得聽如盲得視投身委命願聞大道焉老君曰微哉子之問也夫大道守真三品為則以一為度以正為德也又問曰道有三品要得升仙其以何行乎老君曰以一為數子能知一萬事畢閉塞情欲入奧室鍊金食氣為第一子能知之守莫失喜於是踴躍稽首問曰鍊金奈何曰神方也自玄元清虛莫不由金符而得道履九幽而入杳冥上下虛無因神眀而俱升喜復稽首曰願聞之老君於是授喜太清八符經太清觀天經九都經神丹經金液經及入鍊九轉還丹伏火之訣焉其方曰金液還丹仙華流高飛雲翔登天丘赤黃之物成須臾當得雄雌紛亂珠可以騰變致行厨靈人玉女我為夫出入無間天同符其精凝霜善沈浮汝其震驚必來游九丹曰第一曰丹華第二曰神符第三曰神丹第四曰還丹第五曰餌丹第六曰鍊丹第七曰柔丹第八曰伏丹第九曰寒丹又歌曰圓三五寸一分口四八兩寸脣長二尺厚薄均腹三齊坐垂溫陰在上陽下奔首尾武中間文始七十終三旬內二百善調勻陰火白黃芽鉛兩凑聚輔翼人子處宫得安存來去遊不出門漸成大性精純即歸一還本原至一周甚殷勤密防護莫迷昏途路遠甚幽玄若達此會乾坤子午治淨魄魂得長壽入仙村樂道者尋其文諦思之勿須論夫水銀硝砂液珠以作神丹服一刀圭飛升天宫身堅食氣乃得神仙汝當欲神仙當先服還丹金液乃存其神即時升仙上為真人汝不服還丹金液虛自苦耳為寒溫風濕鬼氣所擊司命不能救也道之如此可不勉哉汝善溫衣少食適體守虛虛無自然鬼亦不能殺也年壽盡竟即自死耳何以言之以其不堅無神故也譬猶萬物之生非欲故求死但自老朽枯槁腐死耳人亦如此矣吾以此喻汝汝自弩力存神作丹早自防衛得此道者長生不死役鬼使神苟非其人萬金不傳不得以示愚人口是心非不信之人令訕毁神道益子之過度世在己無鬼神也嗟乎行尸雖富有萬物貴為天王而快意從欲不滿百年成一器之土甚可哀哉合作神丹若須臾耳一成便仙與天相畢恣心所欲樂何央乎關令稽首又問曰食氣如何老君曰食氣固精受明玄經生道要妙出幽入冥上固雲門下固靈根如雲無足水之無根元氣混沌變化太清審而握之久久自靈知之甚易行之甚難矣夫修生之人故德以形為車道以氣為馬魂以精為根魄以目為户形動德散氣越道叛精消魂損目動魄亂是以聖人靜形閉氣畜精愛視道德虛疑魂魄固守形一神萬道乃成就道成變化臨危不懼子能修之得道大要夫生不再來故導之以氣也寶氣則得道得道則長久神者精也寶精則神明神明則長生氣行之則為道也精存之則為寶也行氣一名鍊氣一名長息法正偃卧握固潄口咽之三咽行氣鼻但內氣口但出氣徐縮鼻引之莫極滿滿則難還初為之時人五息已一息可吐也每口吐氣欲止輒一吐之安其身和其氣無與息事若不和且止和乃為之當守之勿倦氣至形安鼻息和則清氣來至自覺形熱熱則汗出且勿起安養務欲久久則三蟲自去意想分明也常以夜半雞鳴祝曰東方青牙服食青牙飲以朝華三咽止南方朱丹服食朱丹飲以丹池三咽止中央之野仰太山服元氣飲以醴泉三咽止西方明石服食明石飲以靈液三咽止北方玄滋服食玄滋飲以玉飴三咽止如此三十日三蟲皆死正神正氣自安定伏尸不復還心中子自仙矣於是為作玉曆中經三篇五十五章本在上皇藏之金匱玉曆笥中今將付爾慎勿妄傳其要曰養生之術絶俗事約歸清淨養元氣和積蓄神還反生審欲修道守自然慎無導引勞爾形辟穀不食餓子精六甲陰陽勿擾傾心狂意亂神去身枯骨獨立歸黃泉靜處冥室養爾神精熟思之道自然故據神記論曰其三篇乃元氣之祖酌自然之和其要在於抱一而無離矣一日之道朝飽暮飢一月之道不失盛衰一歲之道夏瘦冬肥百歲之道節穀食棗千歲之道獨男無女是謂長生久視道莫有數矣次授自然經歷藏經及黃庭經內祕咽氣吞精存真固齡之道關令受畢因各祕而內修焉關令又稽首曰敢問大道如何老君曰子骨相應真眼有日光項負圓耀五藏有文面有七星上象天文下順地理莫不備足故寄慧鍊神挺生末劫當為真人之長也此由先代行善故也吾今傳子大道上可以舉身升遐度世不死不生至真無上欲教化隨意自在度人無量代中可以為國王之師下可安身全家救護天人命終受化更生福祿久久咸使入道反自然也爾豈不願奉之乎喜稽首曰今聞至道豁然已歷萬劫而更生誠宿命之遇也願天尊大人賜為我著書說大道之意喜得奉而修焉老君曰汝應為此宛利天下棄賢世界傳弘大道子神仙者矣喜於是退官託疾以其年十二月二十五日邀歸本第至二十八日受五千文於斯地矣今之樓觀即尹大夫關令故宅焉其望氣草樓及老君所乘車今猶在矚老君曰道德經正文有五千言然其中配讚語勢凡二篇有五千餘言也故史記曰老子為關令說五千餘言申道德之意是也夫道因言以明無言因形以觀無形故凡書不盡言言不盡意夫聖人之意則冥符大道之心乎大道何心哉以天人之心為心吾此經淳真表裏洞虛彌綸十方廣大周備天地及萬物生乎其中散則為無形見則有文章故聖人體而則之意可見矣大道之化可觀矣因象以見無象因形以觀無形此經可以觀上古之始則可知矣自然有三萬六千威神侍衛經文天地兩儀象此二篇大包天地細入毫端八十一章當九州四海天地之數備矣故能藏崑崙於黍米也此經可以靜祈難以言辨矣喜禮拜受言畢曰弟子雖不敏請事斯語矣夫五千文宣道德之原精進研之則聲參太極高上遙唱諸天歡樂則携挈玄人靜思祈真則衆妙感會內觀形影則神氣長存體洽道德則萬神震伏禍滅九幽福生十方安國寧家孰能知乎無為之文污之不辱飾之不榮擾之不濁澄之不清自然也應道而見傳告無窮常者也末代之人以道德經為儒談之書了無復尊恭之禮大謬之甚也此經本出太上虛無之宫諸經之祖宗上以洞明大道下以敷弘代教不可思而議也辨而詰也太上衆真誦詠不輟其況凡人乎道士乎關令又稽首曰道德二篇法象天地將欲內修其理如何老君曰夫道者虛無自然德者不處成功修之者升天位為真人長生不死上古所重也關令叩頭曰死罪死罪喜雖小鄙貪慕神仙乞授一言得以生活老君曰善乃為注五千文次第節解以授之焉其要曰道者謂泥丸也名者謂脾也母者謂丹田也泥丸者天德也理在人頭中紫氣降下下至丹田脾者中黃太一也黃氣徘徊理中宫其神太白守之中有神一不可不思丹田者玄牝也却著脊膂居下元中夜半之時一氣下降周旋三宫妙謂守虛無也異名謂精也一曰精二曰汗三曰液四曰血五曰涕六曰唾故曰異名玄之又玄謂左右腎也衆妙之門人死氣絶於口故曰衆妙之門夫朝食其美暮為屎故曰惡也人行道將以備死故曰不善朝為善功暮為惡故曰斯不善已有無相生謂口與腹也難易相成精與氣也長短相形肝與肺也高下相傾心與腎也音聲相和口與耳腸與胃也先後相隨兩足也無為之事謂守自然也萬物作焉謂六甲錯身也不去謂道一行於形中不行則形死次謂心行一心神赤赤氣生五色過幽關入眀堂上至絳宫華蓋之下向窮關入紫宫故曰尚賢年少之時氣脉充盛精神備具自謂常生及至身老神明皆去故曰難得之貨虛其心謂無所思實其腹謂常閉氣强其骨謂不泄精則上下氣通身體之中無不理矣其例略如此也老君曰吾道甚深不可妄傳生道入復神明皆存百節關孔六甲相連徘徊身中錯綜無端胎息守中上與天連名曰大道行之立仙上升太清拜為真人關令稽首曰喜受命矣天道甚重不敢泄言思惟道君哀愍元元老君又曰欲傳吾道德經及節解者當以甲子之日以金錢九千五綵各一匹作四分出黃壇歃丹為約上告皇靈以天地為信日月為盟子傳吾文勿妄示人傳不得人殃及其身身死名滅下流子孫可不慎焉吾道虛無自然玄靜守一非代庸庸之人所當見聞子欲長生務入深出節食服氣存道念無令形體不死萬代長存關令跪受遂得長生之道焉或云殺白馬以為誓者蓋僞文今非取限也關令又稽首曰大道微妙自然深遠特希開悟耳老君乃於關令宅南望氣臺上說道德經其要曰告子道要云道自然行者能得聞者能言知者不言言者不知所以言者以音聲相聞是以故談以言相然不知道者以言相煩不聞不言不知所由然譬如知音者識音以弦心知其音口不能傳道深微妙知者不言識音聲悲抑音內推心令口言言者不知夫道象無形端恍惚若亡存譬如種木未生時不見枝葉根合會地水火風四氣時往緣氣為生者地聚合凝稍堅敷榮條達新味異行不等甜苦酸鹹辛氣行有多少强弱果不均同出異名色各自生意因從是異性行而有受形神含養陰陽道隨所倚為親生道非一類一切人非人本出於虛無感激生精神譬如起音者掇弦手動傳宫商角徵羽口氣呼吸元身口意為本道出上首先本靜在虛淨故曰道自然俱出於太素虛無之始端髣佛之精光微妙之上玄譬如萬丈坑下有淡流泉視之甚濁微徹見底亦難窈窈而冥冥不知所由然亦如終者去不見其靈魂淳陰共和合陽不能顯分過往與甫來視譬以見前尚不能了理安能知亡存譬如瘖痾者不能傳人言為聾彈宫商其人豈能聞才辨有其智受教如語傳自謂通其辭情猥不能宣是故失生本焉能知道原告子生道本示子之自然至乎萬物生情行相結連如壞復成如滅復生以成五行陰與陽并展轉變化遂為物精吾思是道本出窈冥愚不别知自謂適生子無道眼安知生靈僞道養形真道養神神真通道能亡能存神能飛形并復移山形為灰土其可識焉耳目聲色為子留愆鼻口所喜香味是冤身為惱本痛癢寒溫意為形思愁毒憂煩吾拘於身知為大患觀古視今誰存形完吾尚白首衰老孰年吾本棄俗厭離世間抱元守一過度神仙子未能守但坐榮官子能不動神靈得安子能捐欲舉事能全子能無為知子志堅今為子說露見敷陳散解剖判真僞列分子當諦受重道殷勤道為明出經為學先授與能行不擇富貧教化與樂非有疏親學不得明師焉能解疑難吾道如毫毛誰當能明分上代始已來所更如沙塵動則有載劫自唯甚苦勤吾學無所學乃能明自然道言微深子未能别撮取於略慎誡勿失先捐諸欲莫令意逸間居靜處精思齊室丹書萬卷不如守一經非不達中有虛實言有必無子未能别言無必有子未能决但當按行次來次滅道有真僞福有凶吉罪有公私明有纖密占往知來不如朴質夫身意者我所患也無心我何知乎無身當何憂乎是以聖人去欲入無以輔其身以制志意而還思慮故終日不視不聽不言不食內知而抱玄夫欲視亦無所見欲聽亦無所聞欲言亦無所道欲食亦無所味淡泊寂哉不可得而言復歸於無物若常能清靜形骸全天地充實長保年此非託於天地亦非託於鬼神天非託於萬物也常以虛為身以無為心此兩者同謂無身之身無心之心可謂守神守神玄通是謂道同其猶高山大澤非欲蟲鳥獸狼蟲烏獸狼自來歸之深川河海非欲魚鱉蛟龍魚鱉蛟龍自來歸之人能虛空無為非欲於道道自歸之矣夫道甚深奧虛無之淵子雖聞說心不微殫所以然者書不盡言著經處文學以相然子當寶之內念思惟自然之道不與子期喜即稽首敢問學之奈何老君曰善為書述者必綴其文善論達其事者必通其言勉而勤之得道矣為正無處正自居之不受於邪邪氣自去所謂為道道自助矣不然於祠鬼自避之不勞於神壽命無期無進無退誰與為謀為是致是非自然哉於是授喜要解凡百餘篇關令稽首曰今聞命矣老君說經訖又曰慎而行之寶而懷之藏之五內慎勿泄言吾將遠遊不期自會也古先生者吾之身也化乎竺乾今已返神還乎無名絶身滅有綿綿常存吾在天為無名之君在代為有古先生其出無欲其入無為不終不始常存自然應運輪轉隨時為名經天歷地無所不之昔嘗下教觀乎天竺遍覽羣俗凶獷相殘血氣厲空痛傷吾情於是返神還乎無名太上有命應為周師吾懷往念是以西旋開化天竺大秦諸國雜俗之人也吾今逝矣亦返一原關令曰願從聖尊遠遊觀化乎老君曰我行無常處也或上天或入地或登山或入海或之大國或往小國或見天王賢人或見聖人帝王或見下賤凡夫或見采女美人或見奴婢卒伍或詣胡夷戎狄傖吳楚越氏羌蠻貊非人之鄉鬼神之封嶮難之中觀化十方出入無間或坐在立亡子以始受道諸穢未盡焉能隨吾遠行耶關令稽首曰上天入地登山渡海願從大人無所難忌也老君曰子道未成豈能得遠遊耶子有宿德以道相傳子能隨我但誦二篇精研萬遍身入自然方可與子同遊上登九天謁見吾師下化諸國摧伏凶羣今告子道要訣其微言勤能修之真道自成也道成之後七祖父母皆當生化蓮華之中天厨日至自然飛行耳洞聽目洞視入水不溺入火不灼六通四達真道既成靡不周備無所不知無所不能乃可從吾遠遊觀化十方推度萬物豈不善哉子道欲成時自當相迎今未得去也往劫諸真人無不從此經得六通道矣關令復稽首受命焉老君以甲寅年四月八日於宅南山館臨欲升天重告關令曰子當千日清齊修習吾經三年之後往成都市青羊之肆尋吾乃可得焉言訖關令稽首禮謝忽然不見斯須館舍光炎五色玄黃喜出中庭叩頭曰願神人復以一見授吾一要得以守元即仰視睹懸身坐空中雲光之上去地數十丈其狀金人面放五明存亡恍惚老少無常乃有九玄高仙五帝直符與正一使者持節來迎皆身生光明洞照四方自然化生神王力士青龍白獸麒麟獅子列在前後左右喜見天威不覺悲惶因稽首而立老君告曰吾重誡爾爾其守焉除垢止念淨心守一衆垢除萬事畢吾道之要也言訖與諸仙升乎太微焉其日江河泉池忽然泛漲井水溢出山川震動有五色光入貫太微遍於西方盡作青紅色太史蘇由曰有大聖人往千年外聲教及此昭王即敕鐫石記之埋於南郊天祠前斯即老君欲西化胡之先兆也是時關令受言誡深泣涕追慕稱疾棄位獨處空間之室恬惔思道歸志守一極虛本無剖析乙密羅縷妙言內意不出於是心開意達寶而行之其初日之中寐夢飛往太山之巔二日夢仙人隨而侍之三日夢有神光四日夢天下皆來師而事之內觀夢寐知五千文之有道乃清淨而行之論曰按西升經云開道竺乾有古先生欲往升就者誡關尹之言也下文云古先生吾之身者此正前寓言也夫希仙之法要在尋真故假稱彼有先生欲往升就然授道既訖不假祈求恐執教之人不明權實故於兹下章云吾身是也或云古先生吾之師者亦寓言也而或執之以為實録誤之甚矣何者若古有其人不應今欲升就如彼方見在何謂滅身絶有乎以此詳之寓言稱師審矣況夫無名有古並是老君之號者歟謂前所言吾之身者信矣或云化乎竺乾久將返神吾今逝矣亦返一原者蓋明化彼化此俱是一身此返彼本來無二猶恐不明道力信悟未深故顯以神通光燭天下將示去來自在聖德無倫用以警發真人令其不厭尹真云今睹聖姿超絶乃天上極尊何邊夷之有斯言微矣此山阜上關令先立臺館以瞻星候氣老君於中升虛後人遂呼為老子陵蓋非墳陵也爾雅曰大阜曰陵此之謂矣老君曰存三一之法先存當兩眉間却入一寸為明堂二寸為洞房三寸為泥丸此上丹田宫也上丹田中有赤子字曰元先一名帝卿人長三寸赤幘赤衣赤履次思心中名為絳官此中丹田也其中真人字子丹一名光堅人長三寸服色同前次思臍下三寸為命門宫此下丹田也其中嬰兒字元陽一名谷玄人長三寸服色同前思見下一坐金牀玉几常以金爐玉匕攪精訖思上一來住中一左下一手持金爐玉匕立在中一右先以精哺上一次哺中一計令人得十飲口許便思上一還所住次哺下一次思下一復還所住訖便止次又思白氣如車輪大以自覆次思赤氣覆白氣訖便可卧又洞房中有白氣大如雞子光如月照所在凡次上法常當晝夜存之故曰子欲長生三一當明子能守一一亦守子坐亦念一卧亦念一行亦念一入山林亦念一入軍念一飲食念一有疾念一有憂念一無不得願也老君曰夫精血脉之川流守骨之靈神精去則骨枯骨枯則死是以寶也人以身為國神為君精為臣氣為人也氣變為精精變為神神化為嬰兒嬰兒上為真人真人然後為赤子此真一也天有三光日月星人有三寶三丹田也常行氣愛精則三田寶赤子存此其要道也若專存一不忘則萬事畢矣夫守一者遊行天地無所畏也久久可見見則身中三萬六千神共舉其身白日升天此上士也次則延年却惡中士也有急不忘之必得過脫灾厄下士也守一之道得惡夢及見怪勿以告人但正心念一則不為灾害夫一者身之帝君也人能守一一亦守人入三軍甲兵不能殺之入山林百害不敢犯之入江海蛟龍避之入疫疾鬼氣自消乃至移徙起工但當念一不避太歲大將軍八神禁忌及出入來往終無殃咎焉老君曰夫人欲修身養性行道化形求福致願結氣成神延年益壽終始無窮者要當清靜故天靜以為政地靜以為定神靜以為變人靜以為生故清則感靜則應也將靜之時反聽內觀還念形中心不妄念口不妄言形不妄動然後乃無色之色為之見無聲之聲為之聞無味之味為之甘不言之言為之崇神景為之降福德為之臻和氣為之應心則聖意則明好夢善隱能睹求於徵夢則正睹於未然如未睹者由精誠未至至則通矣老君曰子欲入靜室常用除日先沐浴齊戒二十五日然後乃可入室精鍊己身身中魂魄和平乃可入室耳神不和者則人煩亂內外躁動不能自安也故為後賢叙說變事焉老君曰入室之時有丹蛇來著人心不驚恐者當與真人語或見西王母乘鳳凰車後駕六赤龍車前三朱雀見之勿驚與人語慎勿答若見恚亦勿恐怖恚不止真人自代子語矣西王母去後大道來見見時上有日月星或有天師與真人來倡樂萬端勿視也仙人玉女慎勿觀也龍蛇禽獸或犯子者慎勿驚也此並子形中精神所為非真也汝見之但安心定意此物自去矣或有老婦女及異形者勿與語勿交往乃吉矣入室二十五日有兩女來欲與子語慎勿與語四十五日當有一書生來欲與子語亦勿共語六十日室上有兩明星躊躇經三日亦勿怪八十五日有白首老公乘白鹿來呼子子曰吾有先人罪負未能致賢也百五日有天師來考子祖宗功德子對曰先代以來罪過未盡是以故於室中精鍊耳百二十五日去室三百步有千乘萬騎子勿怪之百五十日邪神稱子父母妻子來試子故非子父母也子但正身定意精心百八十日後室自明知國中安危存亡自是之後具列身中官府顯見二百八十日之後形中惡病皆除邪氣不加身千日已後金瘡痍瘢灸斫自滅遂為真人矣其九室者第一室是去邪思也三神為其守太陽居左教之太陰居右與之太和居內利之第二室是正身思也與精氣合為理鬼物俱居外瞻正與不正宅神居內視可成不也第三室是致正思也精氣鬼物皆合為一若居都市中神居其外勿怪之第四室是大正思也人精得與神小合也第五室是極正思也真神得入其內精氣次之鬼物居其外方曰去也第六室是深正思也神精正行氣正以得其所故氣鬼物邪惡以除去也第七室是正真思也大真神至衆邪畏之悉除去獨有真神在也第八室玄洞思也身與真神都合為人也旦夕未嘗念地上俗間一事也第九室是大洞思也已成真人也隨氣而卧大洞道備矣主埋神仙事不得復知人事也宜慎之焉然後堅閉門慎不得與俗相見也須食置於户外令之自取若不復取勿令人動搖當易其形容自有去時矣論曰夫人入室者意在清齊誦經或服藥行氣或思真鍊神志唯求道精懇愈切專想不二則能洞感變形易顔以至仙飛其有不然者由於精誠不至至不能久故也豈徒委形幽室而已乎關令奉教修行三年事畢顔容更少面有金色者蓋精之至也道成之後乃往成都焉所言成都者示其學道都成者耳蓋指事以為喻矣太上混元真録
